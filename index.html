<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSGT SFA - Admin</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="loginPage" class="page">
        <div class="login-card">
            <img src="logo.png" alt="Logo" class="login-logo" onerror="this.style.display='none'">
            <h1>CSGT SFA</h1>
            <h2>Administrator Access</h2>
            <input type="text" id="adminUser" placeholder="Admin Username" autocomplete="off">
            <input type="password" id="adminPass" placeholder="Password">
            <label class="checkbox-label"><input type="checkbox" id="rememberAdmin"> Remember Admin</label>
            <p id="loginError" class="error-msg"></p>
            <button onclick="adminLogin()">Login as Admin</button>
            <button onclick="showRegister()" style="background:transparent;color:#1B3A5C;border:1px solid #1B3A5C;width:100%;padding:12px;border-radius:8px;font-size:15px;cursor:pointer;font-weight:600">Register Account</button>
            <p class="version-text">NeilQ. Deployment Version: v.20.13.7.26 20:01</p>
        </div>
    </div>

    <div id="registerPage" class="page" style="display:none">
        <div class="login-card">
            <img src="logo.png" alt="Logo" class="login-logo" onerror="this.style.display='none'">
            <h1>CSGT SFA</h1>
            <h2>Create New Account</h2>
            <input type="text" id="regAgentId" placeholder="Agent ID (Given by the Admin)">
            <input type="text" id="regName" placeholder="Full Name">
            <select id="regBranch" style="width:100%;padding:12px 16px;border:1px solid #ddd;border-radius:8px;font-size:15px">
                <option value="">Select Branch</option>
            </select>
            <input type="text" id="regUsername" placeholder="Username">
            <input type="password" id="regPassword" placeholder="Password">
            <input type="password" id="regConfirm" placeholder="Confirm Password">
            <p id="regError" class="error-msg"></p>
            <button onclick="registerAccount()">Register Account</button>
            <button onclick="backToLogin()" style="background:transparent;color:#1B3A5C;border:none;cursor:pointer;font-size:14px">Already have an account? Log in</button>
        </div>
    </div>

    <div id="adminPage" class="page" style="display:none">
        <div class="topbar">
            <h2>CSGT SFA - Admin Dashboard</h2>
            <div style="display:flex;gap:8px">
                <button onclick="cleanupOld()" class="logout-btn" style="font-size:12px">Cleanup 30d+</button>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </div>
        </div>
        <div class="tabs">
            <button class="tab active" onclick="switchTab('orders')">Orders</button>
            <button class="tab" onclick="switchTab('branches')">Branches</button>
            <button class="tab" onclick="switchTab('principals')">Principals</button>
            <button class="tab" onclick="switchTab('agents')">Agents</button>
            <button class="tab" onclick="switchTab('calls')">Calls</button>
        </div>
        <div class="content">
            <div id="tab-orders" class="tab-content active"></div>
            <div id="tab-branches" class="tab-content"></div>
            <div id="tab-principals" class="tab-content"></div>
            <div id="tab-agents" class="tab-content"></div>
            <div id="tab-calls" class="tab-content"></div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay" style="display:none" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
