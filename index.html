<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>CSGT SFA - Admin</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="loginPage" class="page">
        <div class="login-card">
            <img src="logo.png" alt="Logo" class="login-logo" onerror="this.style.display='none'">
            <h1>CSGT SFA</h1>
            <h2>Administrator Access</h2>
            <input type="text" id="adminUser" placeholder="Admin Username" autocomplete="off">
            <input type="password" id="adminPass" placeholder="Password">
            <label class="checkbox-label" style="font-size:14px;color:#555;display:flex;align-items:center;gap:8px;align-self:flex-start"><input type="checkbox" id="rememberAdmin"> Remember Admin</label>
            <p id="loginError" class="error-msg"></p>
            <button class="btn-login" onclick="adminLogin()">Login as Admin</button>
            <button class="btn-outline" onclick="showRegister()">Register Account</button>
            <p class="version-text">NeilQ. Deployment Version: v.20.13.7.26 20:01</p>
        </div>
    </div>

    <div id="registerPage" class="page" style="display:none">
        <div class="login-card">
            <img src="logo.png" alt="Logo" class="login-logo" onerror="this.style.display='none'">
            <h1>CSGT SFA</h1>
            <h2>Admin Registration</h2>
            <input type="text" id="regAdminId" placeholder="Admin ID">
            <input type="text" id="regName" placeholder="Full Name">
            <input type="text" id="regUsername" placeholder="Username">
            <input type="password" id="regPassword" placeholder="Password">
            <input type="password" id="regConfirm" placeholder="Confirm Password">
            <p id="regError" class="error-msg"></p>
            <button class="btn-login" onclick="registerAdmin()">Register Admin</button>
            <button class="btn-outline" onclick="backToLogin()">Already have an account? Log in</button>
        </div>
    </div>

    <div id="adminPage" style="display:none">
        <div class="topbar">
            <div style="display:flex;align-items:center;gap:12px">
                <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
                <h2>CSGT SFA</h2>
            </div>
            <div class="actions">
                <button onclick="cleanupOld()">Cleanup 30d+</button>
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="mobile-overlay" id="mobileOverlay" onclick="toggleMobileMenu()"></div>
        <div class="mobile-sidebar" id="mobileSidebar">
            <button class="close-btn" onclick="toggleMobileMenu()">✕</button>
            <h3>Navigation</h3>
            <div id="mobileNav"></div>
        </div>

        <div class="app-layout">
            <div class="sidebar" id="sidebar">
                <button class="active" onclick="switchTab('orders')">📦 Orders</button>
                <button onclick="switchTab('products')">📋 Products</button>
                <button onclick="switchTab('extruck')">🚛 Extruck</button>
                <button onclick="switchTab('customers')">👥 Customers</button>
                <button onclick="switchTab('branches')">🏢 Branches</button>
                <button onclick="switchTab('principals')">🏭 Principals</button>
                <button onclick="switchTab('agents')">👤 Agents</button>
                <button onclick="switchTab('calls')">📸 Calls</button>
            </div>
            <div class="content">
                <div id="tab-orders" class="tab-content active"></div>
                <div id="tab-products" class="tab-content"></div>
                <div id="tab-extruck" class="tab-content"></div>
                <div id="tab-customers" class="tab-content"></div>
                <div id="tab-branches" class="tab-content"></div>
                <div id="tab-principals" class="tab-content"></div>
                <div id="tab-agents" class="tab-content"></div>
                <div id="tab-calls" class="tab-content"></div>
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay" style="display:none" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
